<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" role="img" aria-labelledby="t1 d1">
  <title id="t1">Simplified taskpapr board</title>
  <desc id="d1">Diagram: parchment canvas with two tiles labelled Work and Personal, dotted grid, and a zoom hint.</desc>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d6ccb8" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#f5f0e8"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <!-- Work tile -->
  <g transform="translate(48,56)">
    <rect width="220" height="280" rx="6" fill="#faf7f1" stroke="#c9bfa8" stroke-width="2"/>
    <rect width="220" height="36" rx="6" fill="#ede7d9" stroke="#c9bfa8" stroke-width="2"/>
    <text x="12" y="24" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#3a3228">Work</text>
    <rect x="12" y="52" width="196" height="28" rx="3" fill="#fff" stroke="#d6ccb8"/>
    <rect x="12" y="88" width="196" height="28" rx="3" fill="#fff" stroke="#d6ccb8"/>
    <rect x="12" y="124" width="196" height="28" rx="3" fill="#f8f6f0" stroke="#d6ccb8" opacity="0.85"/>
    <text x="32" y="72" font-family="system-ui,sans-serif" font-size="11" fill="#5c5348">Review proposal</text>
    <text x="32" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#5c5348">Email client</text>
  </g>
  <!-- Personal tile -->
  <g transform="translate(300,100)">
    <rect width="200" height="220" rx="6" fill="#faf7f1" stroke="#c9bfa8" stroke-width="2"/>
    <rect width="200" height="36" rx="6" fill="#fef9e7" stroke="#c9bfa8" stroke-width="2"/>
    <text x="12" y="24" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#3a3228">Personal</text>
    <rect x="12" y="52" width="176" height="28" rx="3" fill="#fff" stroke="#d6ccb8"/>
    <text x="32" y="72" font-family="system-ui,sans-serif" font-size="11" fill="#5c5348">Book dentist</text>
  </g>
  <!-- Zoom badge -->
  <rect x="24" y="348" width="72" height="28" rx="4" fill="#ede7d9" stroke="#d6ccb8"/>
  <text x="36" y="367" font-family="system-ui,sans-serif" font-size="11" fill="#7a6f62">100%</text>
</svg>
